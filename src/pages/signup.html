<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BearVisor AI - Sign up</title>
<link rel="stylesheet" href="{{ url_for('static', path='/css/global.css') }}"/>
<link rel="stylesheet" href="{{ url_for('static', path='/css/login.css') }}"/>
</head>

<body>
    <div class="landing-container">
        <div class="brand">
            <h1>BearViSor</h1>
            <p>Catalog, prereqs, advisor calendar, all connected. Ask anything, get a real plan.</p>
        </div>

        <div class="signup-card">
            <h2>Sign Up</h2>

            <form class="form flex" action="{{ url_for('signup_endpoint') }}" method="POST">
                <div class="row">
                    <div class="left">
                        <label>First Name<span>*</span></label>
                        <input type="text" id="first_name" name="first_name" required/>
                        <p class="invalid-input" id="first_invalid">Input 3 - 20 alphabetic characters.</p>
                    </div>
                    <div class="right">
                        <label>Last Name<span>*</span></label>
                        <input type="text" id="last_name" name="last_name" required/>
                        <p class="invalid-input" id="last_invalid">Input 3 - 20 alphabetic characters.</p>
                    </div>
                </div>

                <label>Email<span>*</span></label>
                <input type="email" id="email" name="email" required/>
                <p class="invalid-input" id="email-invalid">Please type a valid email.</p>

                <label>Password<span>*</span></label>
                <input type="password" id="password" name="password" required/>

                <label>Confirm Password<span>*</span></label>
                <input type="password" id="confirm" name="confirm_password" required/>
                <p class="invalid-input" id="password-invalid">Passwords do not match</p>

                <div id="strength-frame">
                    <div class="row">
                        <h2 id="strength-title">Strength</h2>
                        <h2 id="strength-text">strength</h2>
                    </div>
                    <div class="strength-bars">
                        <div class="strength-bar"></div>
                        <div class="strength-bar"></div>
                        <div class="strength-bar"></div>
                        <div class="strength-bar"></div>
                        <div class="strength-bar"></div>
                    </div>
                </div>

                <button id="submit-button" class="submit">Sign up</button>
                
                <a class="sign-up" href="{{ url_for('login') }}">Existing account? Log in</a>
            </form>
        </div>
    </div>
</body>

<script src="{{ url_for('static', path='/js/signup.js') }}"></script>

</html>
