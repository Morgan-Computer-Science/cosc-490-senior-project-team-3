            <section class="table-section">
            <h2>Recent Records</h2>
            <table>
                <thead>
                <tr id="fields-row">
                    <th>ID</th>
                    <th>Name</th>
                    <th>Status</th>
                    <th>Date</th>
                </tr>
                </thead>
                <tbody id="table-body">
                <!-- JS will populate -->
                </tbody>
            </table>
            </section>
        </div>

    <script>
        ITEM_LIMIT = 20;

        class Panel {
            loaded_table = null;
            sort_order = false;
            sort_field = null;
            offset = 0;

            fields = [];

            constructor(table_name) {
                this.loaded_table = table_name;

                this.load_table();
                this.update_table();
            }

            async fetch_data() {
                const response = await fetch(`/api/v1/records?table=${this.loaded_table}&offset=${this.offset}&n=${ITEM_LIMIT}&sort_by=${this.sort_field}&sort_order=${this.sort_order}`);

                const data = await response.json();

                return data;
            }

            set_sort(field) {
                if (this.sort_field == field) {
                    // this.sort_order = this.sort_order == 'ascending' ? 'descending' : 'ascending';
                    this.sort_order = !this.sort_order;
                } else {
                    this.sort_field = field;
                    this.sort_roder = 'descending';
                }
            }

            async load_table(table_name) {
                // this.loaded_table = table_name;

                const data = await this.fetch_data();

                const fields_row = document.getElementById('fields-row');

                fields_row.innerHTML = '';

                for (const field of data.fields) {
                    const field_element = document.createElement('th');
                    const caret = document.createElement('img');

                    field_element.textContent = field;

                    field_element.onclick = () => {
                        this.set_sort(field);
                    }

                    fields_row.append(field_element);
                }
            }

            async update_table() {
                const data = await this.fetch_data();

                console.log(data)

                const table_body = document.getElementById('table-body');

                table_body.innerHTML = '';

                for (const row of data.rows) {
                    const row_element = document.createElement('tr');

                    for (const field of data.fields) {
                        const value = row[field]

                        const element = document.createElement('th');

                        element.textContent = value;

                        row_element.append(element);
                    }

                    table_body.append(row_element);
                }
            }
        }
