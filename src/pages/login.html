<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BearVisor AI - Login</title>

<link rel="stylesheet" href="{{ url_for('static', path='/css/global.css') }}"/>
<link rel="stylesheet" href="{{ url_for('static', path='/css/login.css') }}">
</head>

<body>

<div class="landing-container">

    <div class="brand">
        <h1>BearViSor</h1>
        <!-- <p>AI powered study tools to help students analyze and understand course materials faster.</p> -->
        <p>Catalog, prereqs, advisor calendar, all connected. Ask anything, get a real plan.</p>
    </div>

    <div class="login-card">

        <h2>Sign In</h2>

        <form class="form" action="{{ url_for('login_endpoint') }}" method="POST">

            <label>Email</label>
            <input type="email" id="email" name="email" required>
            <p class="invalid-input" id="email-invalid">Please type a valid email.</p>

            <label>Password</label>
            <input type="password" id="password" name="password" required>
            <p class="invalid-input" id="password-invalid">Please type a password</p>

            <button class="submit" type="submit">Login</button>
            
            <a href="{{ url_for('signup') }}"class="sign-up">Sign up</a>
        </form>
    </div>
</div>

</body>

<script src="{{ url_for('static', path='/js/login.js') }}"></script>
</html>
