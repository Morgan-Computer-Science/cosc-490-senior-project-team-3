<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advisor AI | Smart Scheduler</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card" id="main-card">
        <div id="booking-form">
            <h2>Schedule Meeting</h2>
            <span class="subtitle">Personalized Advisor Agent</span>

            <label for="advisor">Select Advisor</label>
            <select id="advisor" onchange="processAgentLogic()">
                <option value="Dr. Sakk">Dr. Sakk</option>
                <option value="Dr. Shuangbao">Dr. Shuangbao</option>
            </select>

            <label for="date-select">Date</label>
            <input type="date" id="date-select" onchange="processAgentLogic()">

            <label for="reason">Purpose</label>
            <textarea id="reason" placeholder="What would you like to discuss?" oninput="updateButton()"></textarea>

            <div class="logic-bar" id="agent-status">
                › <span id="status-text">Awaiting selections...</span>
            </div>

            <div id="time-section" class="hidden">
                <label>Available Slots</label>
                <div class="time-grid" id="time-grid"></div>
            </div>

            <button id="confirm-btn" class="btn btn-confirm" disabled onclick="showModal()">
                Continue to Review
            </button>
        </div>

        <div id="success-screen" class="hidden" style="text-align: center;">
            <div style="font-size: 3.5rem; margin-bottom: 16px;">✨</div>
            <h2 style="color: var(--success); margin-bottom: 4px;">Success!</h2>
            <p style="color: var(--text-muted); font-size: 0.875rem;">Your appointment is locked in.</p>
            <div id="final-receipt"></div>
            <button class="btn btn-ghost" onclick="resetForm()">Schedule Another</button>
        </div>
    </div>

    <div id="confirm-modal" class="modal-overlay hidden">
        <div class="modal">
            <div style="font-size: 2rem; margin-bottom: 12px;">🗓️</div>
            <h3>Verify Details</h3>
            <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 20px;">
                Confirm the details before we notify the advisor.
            </p>
            
            <div id="modal-summary" class="modal-summary-box"></div>

            <button class="btn btn-confirm" onclick="finalSubmit()">Confirm & Book</button>
            <button class="btn btn-ghost" onclick="hideModal()">Go Back</button>
        </div>
    </div>

    <script>
        const advisorData = {
            "Dr. Sakk": { hours: ["09:00", "10:00", "11:00", "13:00", "14:00"] },
            "Dr. Shuangbao": { hours: ["09:00", "10:00", "11:00", "13:00", "14:00"] }
        };

        const myBusyTimes = ["2026-04-20 09:00", "2026-04-22 11:00"];
        let chosenTime = null;

        function processAgentLogic() {
            const dateInput = document.getElementById('date-select').value;
            const advisor = document.getElementById('advisor').value;
            const statusText = document.getElementById('status-text');
            const logicBar = document.getElementById('agent-status');
            const grid = document.getElementById('time-grid');
            const timeSection = document.getElementById('time-section');

            if (!dateInput) return;

            const dateObj = new Date(dateInput);
            const day = dateObj.getUTCDay(); // 0=Sun, 6=Sat
            
            if (day === 0 || day === 6) {
                chosenTime = null;
                timeSection.classList.add('hidden');
                logicBar.classList.add('logic-error');
                statusText.innerText = "Error: Please select a weekday.";
                updateButton();
                return;
            }

            logicBar.classList.remove('logic-error');
            chosenTime = null;
            timeSection.classList.remove('hidden');
            grid.innerHTML = '';
            
            advisorData[advisor].hours.forEach(slot => {
                const btn = document.createElement('div');
                btn.className = 'time-slot';
                btn.innerText = slot;

                if (myBusyTimes.includes(`${dateInput} ${slot}`)) {
                    btn.classList.add('disabled');
                } else {
                    btn.onclick = () => {
                        document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('selected'));
                        btn.classList.add('selected');
                        chosenTime = slot;
                        statusText.innerText = `Agent: ${slot} looks available.`;
                        updateButton();
                    };
                }
                grid.appendChild(btn);
            });
            statusText.innerText = "Select a time slot.";
            updateButton();
        }

        function updateButton() {
            const reason = document.getElementById('reason').value.trim();
            const date = document.getElementById('date-select').value;
            const btn = document.getElementById('confirm-btn');
            btn.disabled = !(chosenTime && date && reason.length > 2);
        }

        function showModal() {
            const advisor = document.getElementById('advisor').value;
            const date = document.getElementById('date-select').value;
            const reason = document.getElementById('reason').value;
            
            document.getElementById('modal-summary').innerHTML = `
                <strong>Who:</strong> ${advisor}<br>
                <strong>When:</strong> ${date} @ ${chosenTime}<br>
                <strong>Why:</strong> ${reason}
            `;
            document.getElementById('confirm-modal').classList.remove('hidden');
        }

        function hideModal() {
            document.getElementById('confirm-modal').classList.add('hidden');
        }

        function finalSubmit() {
            hideModal();
            const advisor = document.getElementById('advisor').value;
            const date = document.getElementById('date-select').value;
            const reason = document.getElementById('reason').value;

            document.getElementById('booking-form').classList.add('hidden');
            document.getElementById('success-screen').classList.remove('hidden');
            document.getElementById('final-receipt').innerHTML = `
                <div id="receipt">
                    <strong>Who:</strong> ${advisor}<br>
                    <strong>When:</strong> ${date} at ${chosenTime}<br>
                    <strong>What:</strong> ${reason}
                </div>
            `;
        }

        function resetForm() {
            chosenTime = null;
            document.getElementById('date-select').value = '';
            document.getElementById('reason').value = '';
            document.getElementById('advisor').selectedIndex = 0;
            document.getElementById('time-grid').innerHTML = '';
            document.getElementById('time-section').classList.add('hidden');
            document.getElementById('agent-status').classList.remove('logic-error');
            document.getElementById('status-text').innerText = 'Awaiting selections...';
            document.getElementById('confirm-btn').disabled = true;
            
            document.getElementById('success-screen').classList.add('hidden');
            document.getElementById('booking-form').classList.remove('hidden');
        }

        document.getElementById('date-select').setAttribute('min', new Date().toISOString().split('T')[0]);
    </script>
</body>
</html>
