<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advisor AI | Smart Scheduler</title>
    <link rel="stylesheet" href="advisor.css">
</head>
<body>

    <div class="card" id="main-card">
        <div id="booking-form">
            <h2>Schedule Meeting</h2>
            <span class="subtitle">Personalized Advisor Agent</span>

            <label for="advisor">Select Advisor</label>
            <select id="advisor" onchange="processAgentLogic()">
                <option value="Dr. Sakk">Dr. Sakk</option>
                <option value="Dr. Shuangbao">Dr. Shuangbao</option>
            </select>

            <label for="date-select">Date</label>
            <input type="date" id="date-select" onchange="processAgentLogic()">

            <label for="reason">Purpose</label>
            <textarea id="reason" placeholder="What would you like to discuss?" oninput="handleReasonInput()"></textarea>

            <div class="logic-bar" id="agent-status">
                <span>›</span> <span id="status-text">Awaiting selections...</span>
            </div>

            <div id="time-section" class="hidden">
                <label>Available Slots</label>
                <div class="time-grid" id="time-grid"></div>
            </div>

            <button id="confirm-btn" class="btn btn-confirm" disabled onclick="showModal()">
                Continue to Review
            </button>
        </div>

        <div id="success-screen" class="hidden" style="text-align: center;">
            <div style="font-size: 3.5rem; margin-bottom: 16px;">✨</div>
            <h2 style="color: var(--success); margin-bottom: 4px;">Success!</h2>
            <p style="color: var(--text-muted); font-size: 0.875rem;">Your appointment is locked in.</p>
            <div id="final-receipt"></div>
            <button class="btn btn-ghost" onclick="resetForm()">Schedule Another</button>
        </div>
    </div>

    <div id="confirm-modal" class="modal-overlay hidden">
        <div class="modal">
            <div style="font-size: 2rem; margin-bottom: 12px;">🗓️</div>
            <h3>Verify Details</h3>
            <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 20px;">
                Confirm the details before we notify the advisor.
            </p>
            
            <div id="modal-summary" class="modal-summary-box"></div>

            <button id="submit-btn" class="btn btn-confirm" onclick="finalSubmit()">Confirm & Book</button>
            <button class="btn btn-ghost" onclick="hideModal()">Go Back</button>
        </div>
    </div>

    <script>
        const advisorData = {
            "Dr. Sakk": { hours: ["09:00", "10:00", "11:00", "13:00", "14:00"] },
            "Dr. Shuangbao": { hours: ["09:00", "10:00", "11:00", "13:00", "14:00"] }
        };

        const myBusyTimes = ["2026-04-20 09:00", "2026-04-22 11:00"];
        let chosenTime = null;

        const apiKey = ""; 
        let debounceTimer;

        function handleReasonInput() {
            updateButton();
            const reason = document.getElementById('reason').value.trim();
            const statusText = document.getElementById('status-text');
            
            clearTimeout(debounceTimer);
            
            if (reason.length > 10) {
                statusText.innerText = "AI is reviewing your purpose...";
                debounceTimer = setTimeout(() => getAIFeedback(reason), 1000);
            } else if (chosenTime) {
                statusText.innerText = `Agent: ${chosenTime} looks available.`;
            } else {
                statusText.innerText = "Select a time slot & enter a purpose.";
            }
        }

        async function getAIFeedback(reasonText) {
            const statusText = document.getElementById('status-text');
            
            const payload = {
                contents: [{ parts: [{ text: `The student wants to meet their academic advisor. Their stated reason is: "${reasonText}". Provide ONE short, encouraging sentence giving them a quick tip on what to bring or how to prepare for this specific topic.` }] }],
                systemInstruction: { parts: [{ text: "You are a helpful academic assistant." }] }
            };

            const maxRetries = 5;
            const delays = [1000, 2000, 4000, 8000, 16000];

            for (let i = 0; i <= maxRetries; i++) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) throw new Error("API Error");
                    
                    const result = await response.json();
                    const aiTip = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    if (aiTip) {
                        statusText.innerHTML = `<strong>Smart Tip:</strong> ${aiTip}`;
                        return;
                    }
                } catch (error) {
                    if (i === maxRetries) {
                        statusText.innerText = "Ready to book. (AI tip unavailable)";
                    } else {
                        await new Promise(res => setTimeout(res, delays[i]));
                    }
                }
            }
        }

        function processAgentLogic() {
            const dateInput = document.getElementById('date-select').value;
            const advisor = document.getElementById('advisor').value;
            const statusText = document.getElementById('status-text');
            const logicBar = document.getElementById('agent-status');
            const grid = document.getElementById('time-grid');
            const timeSection = document.getElementById('time-section');

            if (!dateInput) return;

            const dateObj = new Date(dateInput);
            const day = dateObj.getUTCDay(); // 0=Sun, 6=Sat
            
            if (day === 0 || day === 6) {
                chosenTime = null;
                timeSection.classList.add('hidden');
                logicBar.classList.add('logic-error');
                statusText.innerText = "Error: Please select a weekday.";
                updateButton();
                return;
            }

            logicBar.classList.remove('logic-error');
            chosenTime = null;
            timeSection.classList.remove('hidden');
            grid.innerHTML = '';
            
            advisorData[advisor].hours.forEach(slot => {
                const btn = document.createElement('div');
                btn.className = 'time-slot';
                btn.innerText = slot;

                if (myBusyTimes.includes(`${dateInput} ${slot}`)) {
                    btn.classList.add('disabled');
                } else {
                    btn.onclick = () => {
                        document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('selected'));
                        btn.classList.add('selected');
                        chosenTime = slot;
                        handleReasonInput(); // Trigger AI update or standard status update
                    };
                }
                grid.appendChild(btn);
            });
            
            if(!chosenTime) statusText.innerText = "Select a time slot.";
            updateButton();
        }

        function updateButton() {
            const reason = document.getElementById('reason').value.trim();
            const date = document.getElementById('date-select').value;
            const btn = document.getElementById('confirm-btn');
            btn.disabled = !(chosenTime && date && reason.length > 2);
        }

        async function showModal() {
            const advisor = document.getElementById('advisor').value;
            const date = document.getElementById('date-select').value;
            const reason = document.getElementById('reason').value;
            
            // Show basic details immediately and add a placeholder for the AI summary
            document.getElementById('modal-summary').innerHTML = `
                <strong>Who:</strong> ${advisor}<br>
                <strong>When:</strong> ${date} @ ${chosenTime}<br>
                <strong>Raw Input:</strong> ${reason}<br>
                <div id="ai-summary-container" style="margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--border);">
                    <em id="ai-summary-text" style="color: var(--primary);">✨ AI is summarizing the meeting agenda...</em>
                </div>
            `;
            
            document.getElementById('confirm-modal').classList.remove('hidden');
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true; // Prevent booking until AI finishes reading it
            
            // Trigger the AI summary generation
            await generateMeetingSummary(advisor, date, chosenTime, reason);
        }

        async function generateMeetingSummary(advisor, date, time, reason) {
            const summaryElement = document.getElementById('ai-summary-text');
            const submitBtn = document.getElementById('submit-btn');
            
            const payload = {
                contents: [{ parts: [{ text: `A student is booking an academic advising meeting. Details:\nAdvisor: ${advisor}\nDate/Time: ${date} at ${time}\nReason: "${reason}".\n\nPlease create a professional, concise 1-2 sentence summary of this meeting's core objectives to be used as an agenda brief.` }] }],
                systemInstruction: { parts: [{ text: "You are an AI meeting summarizer. Keep it extremely brief, professional, and formatted as a direct statement." }] }
            };

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error("API Error");
                
                const result = await response.json();
                const aiSummary = result.candidates?.[0]?.content?.parts?.[0]?.text;
                
                if (aiSummary) {
                    summaryElement.innerHTML = `<strong style="color: white;">✨ AI Brief:</strong><br><span style="color: var(--text-muted);">${aiSummary}</span>`;
                } else {
                    summaryElement.innerText = "Review your details and confirm.";
                }
            } catch (error) {
                summaryElement.innerText = "Review your details and confirm.";
            } finally {
                submitBtn.disabled = false; // Re-enable the confirm button
            }
        }

        function hideModal() {
            document.getElementById('confirm-modal').classList.add('hidden');
        }

        async function finalSubmit() {
            const submitBtn = document.querySelector('.btn-confirm[onclick="finalSubmit()"]');
            const originalText = submitBtn.innerText;
            submitBtn.innerText = "Booking...";
            submitBtn.disabled = true;

            const advisor = document.getElementById('advisor').value;
            const date = document.getElementById('date-select').value;
            const reason = document.getElementById('reason').value;

            const bookingData = { advisor, date, time: chosenTime, reason };

            try {
                // MOCK API CALL - Simulating network delay
                await new Promise(resolve => setTimeout(resolve, 800));

                /* * Standard REST API Submission
                 * Uncomment to send actual data to your server:
                const response = await fetch('https://your-api-endpoint.com/book', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bookingData)
                });
                if(!response.ok) throw new Error("Failed to book");
                */

                hideModal();
                document.getElementById('booking-form').classList.add('hidden');
                document.getElementById('success-screen').classList.remove('hidden');
                document.getElementById('final-receipt').innerHTML = `
                    <div id="receipt">
                        <strong>Who:</strong> ${advisor}<br>
                        <strong>When:</strong> ${date} at ${chosenTime}<br>
                        <strong>What:</strong> ${reason}
                    </div>
                `;
            } catch (error) {
                alert("There was an error connecting to the server. Please try again.");
            } finally {
                if(submitBtn) {
                    submitBtn.innerText = originalText;
                    submitBtn.disabled = false;
                }
            }
        }

        function resetForm() {
            chosenTime = null;
            document.getElementById('date-select').value = '';
            document.getElementById('reason').value = '';
            document.getElementById('advisor').selectedIndex = 0;
            document.getElementById('time-grid').innerHTML = '';
            document.getElementById('time-section').classList.add('hidden');
            document.getElementById('agent-status').classList.remove('logic-error');
            document.getElementById('status-text').innerText = 'Awaiting selections...';
            document.getElementById('confirm-btn').disabled = true;
            
            document.getElementById('success-screen').classList.add('hidden');
            document.getElementById('booking-form').classList.remove('hidden');
        }

        // Set minimum date to today
        document.getElementById('date-select').setAttribute('min', new Date().toISOString().split('T')[0]);
    </script>
</body>
</html>
